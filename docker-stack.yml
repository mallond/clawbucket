version: "3.9"

services:
  picoclaw:
    image: docker.io/sipeed/picoclaw:latest
    volumes:
      - picoclaw_data:/root/.picoclaw
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  memcached:
    image: memcached:1.6-alpine
    command: ["memcached", "-m", "64", "-p", "11211", "-u", "memcache"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  clawbucket-aggregator:
    image: mallond/clawbucket:latest
    command: ["python", "aggregator.py"]
    ports:
      - "8090:8090"
    environment:
      - MEMCACHED_HOST=clawbucket_memcached
      - MEMCACHED_PORT=11211
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  clawbucket:
    image: mallond/clawbucket:latest
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=clawbucket
      - SWARM_NODE={{.Node.Hostname}}
      - TASK_NAME={{.Task.Name}}
      - TASK_SLOT={{.Task.Slot}}
      - TASK_ID={{.Task.ID}}
      - SWARM_SERVICE=clawbucket_clawbucket
      - MEMCACHED_HOST=clawbucket_memcached
      - MEMCACHED_PORT=11211
      - PICOCLAW_URL=http://picoclaw:8080/api/haiku
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=smollm2:135m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: any

volumes:
  ollama_data:
  picoclaw_data:
