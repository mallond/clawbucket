version: "3.9"

services:
  clawbucket:
    image: mallond/clawbucket:latest
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=clawbucket
      - SWARM_NODE={{.Node.Hostname}}
      - TASK_NAME={{.Task.Name}}
      - TASK_SLOT={{.Task.Slot}}
      - TASK_ID={{.Task.ID}}
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: any
