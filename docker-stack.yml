version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  memcached:
    image: memcached:1.6-alpine
    command: ["memcached", "-m", "64", "-p", "11211", "-u", "memcache"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  clawbucket-aggregator:
    image: mallond/clawbucket:arm-agg-local
    command: ["python", "aggregator.py"]
    ports:
      - "8090:8090"
    environment:
      - MEMCACHED_HOST=clawbucket_memcached
      - MEMCACHED_PORT=11211
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  clawbucket:
    image: mallond/clawbucket:arm-agg-local
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=clawbucket
      - SWARM_NODE={{.Node.Hostname}}
      - TASK_NAME={{.Task.Name}}
      - TASK_SLOT={{.Task.Slot}}
      - TASK_ID={{.Task.ID}}
      - SWARM_SERVICE=clawbucket_clawbucket
      - SWARM_SERVICES=clawbucket_clawbucket,clawbucket_clawbucket-b
      - MEMCACHED_HOST=clawbucket_memcached
      - MEMCACHED_PORT=11211
      - PICOCLAW_URL=
      - PICOCLAW_ENABLED=0
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=smollm2:135m
      - DASHBOARD_BOT_LABEL=${DASHBOARD_BOT_LABEL:-BOT}
      - PEER_DASHBOARD_URL=${PEER_DASHBOARD_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: any

  clawbucket-b:
    image: mallond/clawbucket:arm-agg-local
    environment:
      - SERVICE_NAME=clawbucket-b
      - SWARM_NODE={{.Node.Hostname}}
      - TASK_NAME={{.Task.Name}}
      - TASK_SLOT={{.Task.Slot}}
      - TASK_ID={{.Task.ID}}
      - SWARM_SERVICE=clawbucket_clawbucket-b
      - SWARM_SERVICES=clawbucket_clawbucket,clawbucket_clawbucket-b
      - MEMCACHED_HOST=clawbucket_memcached
      - MEMCACHED_PORT=11211
      - PICOCLAW_URL=
      - PICOCLAW_ENABLED=0
      - OLLAMA_URL=http://ollama:11434/api/generate
      - OLLAMA_MODEL=smollm2:135m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: any

volumes:
  ollama_data:

