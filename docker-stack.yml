version: "3.9"

services:
  clawbucket:
    image: mallond/clawbucket:latest
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=clawbucket
      - SWARM_NODE={{.Node.Hostname}}
      - TASK_NAME={{.Task.Name}}
      - TASK_SLOT={{.Task.Slot}}
      - TASK_ID={{.Task.ID}}
      - SWARM_SERVICE=clawbucket_clawbucket
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: any
