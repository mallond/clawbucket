version: "3.9"

services:
  memcached:
    image: memcached:1.6-alpine
    command: ["memcached", "-m", "64", "-p", "11211", "-u", "memcache"]
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  clawbucket:
    image: mallond/clawbucket:latest
    ports:
      - "8080:8080"
    environment:
      - SERVICE_NAME=clawbucket
      - SWARM_NODE={{.Node.Hostname}}
      - TASK_NAME={{.Task.Name}}
      - TASK_SLOT={{.Task.Slot}}
      - TASK_ID={{.Task.ID}}
      - SWARM_SERVICE=clawbucket_clawbucket
      - MEMCACHED_HOST=memcached
      - MEMCACHED_PORT=11211
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 3
      placement:
        constraints:
          - node.role == manager
      update_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: any
